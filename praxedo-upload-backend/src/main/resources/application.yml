spring:
  application:
    name: praxedo-upload-backend
  # Base/JPA/Flyway desactives par defaut (profils local/test = repos in-memory, sans base).
  # Le profil gcp vide cette liste (application-gcp.yml) pour les reactiver.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

storage:
  local:
    base-dir: ${STORAGE_LOCAL_DIR:./data/uploads}
  upload-url-ttl: PT15M
  download-url-ttl: PT5M
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}

scan:
  pending-ttl: PT1H
