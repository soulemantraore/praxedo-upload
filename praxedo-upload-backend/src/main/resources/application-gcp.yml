# Profil "gcp" : adapters reels (scanner distant, Pub/Sub, JPA/Supabase Postgres, GCS).
storage:
  gcs:
    bucket: ${GCS_BUCKET:praxedo-upload-files}

spring:
  # Reactive base/JPA/Flyway (l'application.yml les exclut par defaut pour local/test).
  autoconfigure:
    exclude:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/praxedo}
    username: ${DB_USER:praxedo}
    password: ${DB_PASSWORD:praxedo}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    # Le schema "public" de Supabase n'est pas vide (objets provisionnes hors Flyway)
    # et n'a pas de table d'historique : Flyway s'arrete par securite. baseline-on-migrate
    # cree l'historique ; baseline-version 0 garantit que V1 (v1 > 0) s'applique quand meme
    # (le defaut baseline a la v1 et SAUTERAIT V1, laissant l'app sans tables car ddl-auto:none).
    baseline-on-migrate: true
    baseline-version: 0

scanner:
  base-url: ${SCANNER_URL}
  audience: ${SCANNER_AUDIENCE:${SCANNER_URL}}
  oidc-enabled: ${SCANNER_OIDC_ENABLED:true}
  connect-timeout: PT5S
  read-timeout: PT550S

pubsub:
  project-id: ${GCP_PROJECT_ID:praxedo-upload}
  scan-topic: ${PUBSUB_SCAN_TOPIC:scan-requests}
