# Surcharge profil "test" (merge par-dessus application.yml) : stockage local dans un dossier temporaire.
storage:
  local:
    base-dir: ${java.io.tmpdir}/praxedo-upload-test

# Origine UI factice pour valider la config CORS (voir CorsConfigTest).
app:
  cors:
    allowed-origins: https://praxedo-ui.example.run.app
