# =====================================================================
# Cloud Run service: praxedo-worker
# Single container:
#   - app : the Spring Boot application (profile gcp).
#           Receives the Pub/Sub push at /internal/scan-events, then calls the
#           private scanner service over HTTP (OIDC) with the object's gs:// URI,
#           and writes the verdict it returns to the database. The worker never
#           scans bytes itself.
#
# Database: Supabase (managed Postgres) reached directly over TLS with the stock
# PostgreSQL JDBC driver (DB_URL carries the host + sslmode=require). No Cloud SQL
# Auth Proxy sidecar is needed anymore.
#
# ClamAV no longer lives here either: scanning moved to the separate praxedo-scanner
# service. The worker is therefore light and may scale to zero.
#
# The worker is NOT public: ingress is open so Pub/Sub can reach it over the
# internet, but only the push subscription's service account is granted
# run.invoker (OIDC token). See deploy/README.md.
#
# Rendered by "make deploy-worker" via envsubst, applied with
# "gcloud run services replace". Placeholders: ${...}.
#
# Resource note: single app container, 1 vCPU / 1Gi.
# =====================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${WORKER_SERVICE}
  labels:
    app: praxedo-upload
    component: worker
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # No warm signature DB to keep any more (ClamAV moved to the scanner);
        # the worker can scale to zero. Cold starts are absorbed by Pub/Sub retries.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: ${WORKER_SA}
      # A remote scan can be slow; keep this >= the scanner read-timeout and
      # <= the Pub/Sub push ack deadline (600s).
      timeoutSeconds: 600
      containers:
        # ---- Ingress container: the application ----
        - name: app
          image: ${IMAGE_URI}
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: gcp
            - name: SERVER_PORT
              value: "8080"
            - name: GCP_PROJECT_ID
              value: ${GCP_PROJECT_ID}
            - name: GCS_BUCKET
              value: ${GCS_BUCKET}
            - name: PUBSUB_SCAN_TOPIC
              value: ${PUBSUB_SCAN_TOPIC}
            # Private scanner service. SCANNER_AUDIENCE is the OIDC token audience
            # (the scanner URL); OIDC is enabled in production.
            - name: SCANNER_URL
              value: ${SCANNER_URL}
            - name: SCANNER_AUDIENCE
              value: ${SCANNER_AUDIENCE}
            - name: SCANNER_OIDC_ENABLED
              value: "true"
            - name: DB_URL
              value: ${DB_URL}
            - name: DB_USER
              value: ${DB_USER}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
