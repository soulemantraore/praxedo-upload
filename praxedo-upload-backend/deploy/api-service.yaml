# =====================================================================
# Cloud Run service: praxedo-api
# Single container:
#   - app : the Spring Boot application (profile gcp), serves /api/**
#
# Database: Supabase (managed Postgres) reached directly over TLS with the stock
# PostgreSQL JDBC driver (DB_URL carries the host + sslmode=require). No Cloud SQL
# Auth Proxy sidecar is needed anymore.
#
# This file is a template rendered by "make deploy-api" via envsubst, then
# applied with "gcloud run services replace". Placeholders: ${...}.
# =====================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${API_SERVICE}
  labels:
    app: praxedo-upload
    component: api
  annotations:
    run.googleapis.com/launch-stage: GA
    # Public entry point. Access control is done in-app via the X-API-Key header;
    # "make deploy-api" also grants allUsers run.invoker on this service.
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: ${API_SA}
      timeoutSeconds: 60
      containers:
        # ---- Ingress container: the application ----
        - name: app
          image: ${IMAGE_URI}
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: gcp
            - name: SERVER_PORT
              value: "8080"
            - name: GCP_PROJECT_ID
              value: ${GCP_PROJECT_ID}
            - name: GCS_BUCKET
              value: ${GCS_BUCKET}
            - name: PUBSUB_SCAN_TOPIC
              value: ${PUBSUB_SCAN_TOPIC}
            - name: DB_URL
              value: ${DB_URL}
            - name: DB_USER
              value: ${DB_USER}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
