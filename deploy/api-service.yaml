# =====================================================================
# Cloud Run service: praxedo-api
# Two containers:
#   - app             : the Spring Boot application (profile gcp), serves /api/**
#   - cloud-sql-proxy : Cloud SQL Auth Proxy, exposes Postgres on localhost:5432
#
# Why a proxy sidecar: the application uses the stock PostgreSQL JDBC driver
# (TCP only). Rather than add the Cloud SQL SocketFactory to the app, the proxy
# gives an IAM-authenticated TCP endpoint at 127.0.0.1:5432 with no code change.
#
# This file is a template rendered by "make deploy-api" via envsubst, then
# applied with "gcloud run services replace". Placeholders: ${...}.
# =====================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${API_SERVICE}
  labels:
    app: praxedo-upload
    component: api
  annotations:
    run.googleapis.com/launch-stage: GA
    # Public entry point. Access control is done in-app via the X-API-Key header;
    # "make deploy-api" also grants allUsers run.invoker on this service.
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Start the app only once the proxy sidecar reports healthy.
        run.googleapis.com/container-dependencies: '{"app":["cloud-sql-proxy"]}'
    spec:
      serviceAccountName: ${API_SA}
      timeoutSeconds: 60
      containers:
        # ---- Ingress container: the application ----
        - name: app
          image: ${IMAGE_URI}
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: gcp
            - name: SERVER_PORT
              value: "8080"
            - name: GCP_PROJECT_ID
              value: ${GCP_PROJECT_ID}
            - name: GCS_BUCKET
              value: ${GCS_BUCKET}
            - name: PUBSUB_SCAN_TOPIC
              value: ${PUBSUB_SCAN_TOPIC}
            - name: DB_URL
              value: jdbc:postgresql://127.0.0.1:5432/${DB_NAME}
            - name: DB_USER
              value: ${DB_USER}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
        # ---- Sidecar: Cloud SQL Auth Proxy (localhost:5432) ----
        - name: cloud-sql-proxy
          image: ${PROXY_IMAGE}
          args:
            - "--port=5432"
            - "--address=127.0.0.1"
            - "${SQL_CONNECTION_NAME}"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 10
            failureThreshold: 30
